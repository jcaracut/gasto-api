name: CI/CD ? Test, Build & Deploy to ECS Fargate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Repository-level env (non-sensitive) ──────────────────────────────────────
# Override in: Settings → Secrets and Variables → Actions → Variables
env:
  AWS_REGION:      us-east-1
  ECR_REPOSITORY:  gasto-api
  ECS_CLUSTER:     gasto-cluster
  ECS_SERVICE:     gasto-api-service
  CONTAINER_NAME:  gasto-api
  TASK_DEFINITION: .aws/task-definition.json

jobs:

  # ── Job 1: Run tests (on every push and every PR) ──────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test --no-transfer-progress

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ── Job 2: Build image → push to ECR → rolling deploy to ECS ──────────────
  # Only on push to main (skipped for PRs)
  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC → no long-lived AWS keys in secrets
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build fat JAR (tests already passed)
        run: ./mvnw package -DskipTests --no-transfer-progress

      # ── AWS authentication via OIDC (no static access keys stored) ─────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push: SHA tag (immutable) + latest ─────────────────────────
      - name: Build, tag & push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Stamp the new image URI into the task definition ───────────────────
      - name: Render ECS task definition with new image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      # ── Register new task definition revision & trigger rolling update ──────
      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-def@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
